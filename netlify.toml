# Publish dir must match Netlify default / Site settings: use "dist"
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Expo Router / client-side routing: serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
